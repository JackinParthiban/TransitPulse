<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TransitPulse | Passenger View</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">TP</div>
      <h1>TransitPulse</h1>
    </div>

    <div class="route-filters">
      <h2>Live Routes</h2>
      <div id="route-buttons-container" class="filter-col">
        <p class="loading-text">Loading routes...</p>
      </div>
      
      <button id="ml-toggle" class="ml-btn" onclick="toggleML()">
        <span class="ml-icon">✨</span> Enable AI Prediction Mode
      </button>
    </div>

    <!-- Stop-to-Stop Trip Planner -->
    <div class="trip-planner" style="margin-top:24px; border-top:1px solid rgba(255,255,255,0.05); padding-top:20px;">
      <h2 style="font-size:0.85rem; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:12px;">🗺️ Route Planner</h2>
      <select id="origin-stop" class="search-select">
        <option value="">Select your pickup stop...</option>
      </select>
      <select id="dest-stop" class="search-select">
        <option value="">Select destination stop...</option>
      </select>
      <button class="route-btn" style="margin-top:10px; justify-content:center; background:rgba(79,70,229,0.2); color:#818cf8; border-color:rgba(79,70,229,0.5); font-weight:600;" onclick="calculateTrip()">
        Find Next Arrival
      </button>
      <div id="trip-result" style="margin-top:15px; font-size:0.9rem; display:none; background:rgba(16,185,129,0.1); border-left:3px solid #10b981; padding:12px; border-radius:6px; color:var(--text-light); line-height: 1.5;"></div>
    </div>

    <div class="event-feed" style="margin-top: 24px;">
      <h2>Delay Alerts & ETA</h2>
      <div id="alerts-container" class="alerts-scroller">
         <p class="loading-text">Monitoring live stream...</p>
      </div>
    </div>
    
    <div style="margin-top: auto; text-align:center; padding-top:20px; border-top:1px solid rgba(255,255,255,0.1);">
       <a href="index.html" style="color:var(--text-muted);font-size:0.8rem;text-decoration:none;">&larr; Switch Account</a>
    </div>
  </aside>

  <main class="map-container">
    <div id="map"></div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="app.js"></script>

</body>
</html>
