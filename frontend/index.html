<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TransitPulse | Login</title>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .login-box { background: #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 350px; text-align: center; }
    .brand-icon { background: linear-gradient(135deg, #4f46e5, #818cf8); width: 50px; height: 50px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.5rem; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.4); margin-bottom: 15px;}
    .login-box h1 { margin-top: 0; margin-bottom: 24px; font-size: 1.5rem; letter-spacing: -0.5px;}
    input { width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; font-family: inherit; font-size: 14px; box-sizing: border-box;}
    input:focus { outline: none; border-color: #4f46e5; }
    button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-bottom: 12px; font-family: inherit; transition: 0.2s; font-size: 15px;}
    .btn-admin { background: #4f46e5; color: white; }
    .btn-admin:hover { background: #4338ca; }
    .btn-google { background: white; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-google:hover { background: #f1f5f9; }
    .divider { margin: 20px 0; border-top: 1px solid #334155; position: relative; }
    .divider span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #1e293b; padding: 0 10px; color: #94a3b8; font-size: 0.85rem;}
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-box">
    <div class="brand-icon">TP</div>
    <h1>TransitPulse</h1>
    
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password (Admin Only)">
    
    <button class="btn-admin" onclick="loginAdmin()">Admin Login</button>

    <div class="divider"><span>OR</span></div>

    <button class="btn-google" onclick="loginPassenger()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div style="margin-top: 24px; padding: 14px; background: rgba(79, 70, 229, 0.1); border-radius: 8px; border-left: 3px solid #4f46e5; font-size: 0.85rem; text-align: left; color: #cbd5e1; line-height: 1.4;">
      <strong style="color:white; display:block; margin-bottom:8px;">👨‍⚖️ Demo Evaluation Setup</strong>
      <span style="color:#94a3b8; font-size:0.75rem; text-transform:uppercase;">Admin Dashboard:</span><br/>
      <span style="color:white; font-weight:600;">Email:</span> jackin2874000@gmail.com<br/>
      <span style="color:white; font-weight:600;">Pass:</span> Jack@9566<br/>
      
      <div style="margin-top:10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:10px;">
         <span style="color:#94a3b8; font-size:0.75rem; text-transform:uppercase;">Passenger UI Access:</span><br/>
         <span style="color:white;">Enter any email and click <br/><strong>Continue with Google</strong></span>
      </div>
    </div>
  </div>

  <script>
    function loginAdmin() {
      const email = document.getElementById('email').value.trim();
      const pwd = document.getElementById('password').value.trim();
      // Hardcoded explicit credentials for Admin mode
      if (email === "jackin2874000@gmail.com" && pwd === "Jack@9566") {
        window.location.href = "admin.html";
      } else {
        alert("Incorrect Admin Email or Password.");
      }
    }
    
    function loginPassenger() {
      // Allow any email for passenger mockup via "Continue with Google"
      const email = document.getElementById('email').value.trim();
      if (!email) {
        alert("Please enter any valid email address before pressing Continue with Google.");
        return;
      }
      window.location.href = "passenger.html";
    }
  </script>
</body>
</html>
